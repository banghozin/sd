name: Update market data

on:
  # Every hour at :07 — GitHub deprioritises scheduled runs that
  # overlap with "popular" cron minutes (:00, :15, :30, :45). Using
  # an odd minute reduces the chance of being skipped under load.
  # Schedule is best-effort and may drift up to ~30 minutes.
  schedule:
    - cron: "7 * * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Heartbeat
        run: |
          echo "── trigger: ${{ github.event_name }}"
          echo "── time:    $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "── ref:     ${{ github.ref }}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch FX (Frankfurter)
        run: npm run fetch:fx
        continue-on-error: true

      - name: Fetch sector ETFs (Yahoo Finance)
        run: npm run fetch:sectors
        continue-on-error: true

      - name: Fetch 13F (SEC EDGAR)
        env:
          SEC_CONTACT_EMAIL: "${{ github.repository_owner }}@users.noreply.github.com"
        run: npm run fetch:13f
        continue-on-error: true

      - name: Fetch DART (KR insider)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          if [ -z "$DART_API_KEY" ]; then
            echo "::warning::DART_API_KEY secret not set; skipping DART fetch"
            exit 0
          fi
          npm run fetch:dart
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore(data): auto-update FX + 13F [skip ci]"
          git push
