name: Update market data

on:
  # Every hour at :07 — GitHub deprioritises scheduled runs that
  # overlap with "popular" cron minutes (:00, :15, :30, :45). Using
  # an odd minute reduces the chance of being skipped under load.
  # Schedule is best-effort and may drift up to ~30 minutes.
  schedule:
    - cron: "7 * * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Heartbeat
        run: |
          echo "── trigger: ${{ github.event_name }}"
          echo "── time:    $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "── ref:     ${{ github.ref }}"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch FX (Frankfurter)
        run: npm run fetch:fx
        continue-on-error: true

      - name: Fetch sector ETFs (Yahoo Finance)
        run: npm run fetch:sectors
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore(data): auto-update FX + sectors [skip ci]"
          # Retry push with rebase on conflict — handles concurrent runs
          # racing each other to push to main.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt — pulling and retrying..."
            git pull --rebase origin main || exit 1
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="❌ ${{ github.workflow }} failure"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          open=$(gh issue list --search "$title in:title state:open" --json number --jq '.[0].number // empty')
          if [ -n "$open" ]; then
            gh issue comment "$open" --body "Another failure on $(date -u +'%Y-%m-%d %H:%M UTC') — see $run_url"
          else
            gh issue create \
              --title "$title" \
              --body "Workflow: ${{ github.workflow }}
          Run: $run_url
          First failure: $(date -u +'%Y-%m-%d %H:%M UTC')

          Close this issue when the workflow is healthy again — it will be reopened automatically on the next failure."
          fi
