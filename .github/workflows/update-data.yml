name: Update market data

on:
  # Every hour at :15 (cron is best-effort, may drift up to ~15 min).
  # The "if no diff, skip commit" step at the bottom prevents redundant
  # Vercel rebuilds when prices haven't moved (e.g. off-market hours).
  schedule:
    - cron: "15 * * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch FX (Frankfurter)
        run: npm run fetch:fx
        continue-on-error: true

      - name: Fetch sector ETFs (Yahoo Finance)
        run: npm run fetch:sectors
        continue-on-error: true

      - name: Fetch 13F (SEC EDGAR)
        env:
          SEC_CONTACT_EMAIL: "${{ github.repository_owner }}@users.noreply.github.com"
        run: npm run fetch:13f
        continue-on-error: true

      - name: Fetch DART (KR insider)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          if [ -z "$DART_API_KEY" ]; then
            echo "::warning::DART_API_KEY secret not set; skipping DART fetch"
            exit 0
          fi
          npm run fetch:dart
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore(data): auto-update FX + 13F [skip ci]"
          git push
