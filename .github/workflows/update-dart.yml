name: Update DART insider trades

# Korean insider trade disclosures (DART) update during KR business
# hours but not constantly. Refreshing every 6 hours covers the
# disclosure cadence comfortably while staying within DART's daily
# request quota.

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-dart
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Heartbeat
        run: |
          echo "── trigger: ${{ github.event_name }}"
          echo "── time:    $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch DART (KR insider)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          if [ -z "$DART_API_KEY" ]; then
            echo "::warning::DART_API_KEY secret not set; skipping DART fetch"
            exit 0
          fi
          npm run fetch:dart
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/kr-insiders.json
          if git diff --staged --quiet; then
            echo "No DART changes to commit"
            exit 0
          fi
          git commit -m "chore(data): refresh DART insiders [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt — pulling and retrying..."
            git pull --rebase origin main || exit 1
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="❌ ${{ github.workflow }} failure"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          open=$(gh issue list --search "$title in:title state:open" --json number --jq '.[0].number // empty')
          if [ -n "$open" ]; then
            gh issue comment "$open" --body "Another failure on $(date -u +'%Y-%m-%d %H:%M UTC') — see $run_url"
          else
            gh issue create \
              --title "$title" \
              --body "Workflow: ${{ github.workflow }}
          Run: $run_url
          First failure: $(date -u +'%Y-%m-%d %H:%M UTC')

          Close this issue when the workflow is healthy again — it will be reopened automatically on the next failure."
          fi
