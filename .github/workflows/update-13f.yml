name: Update 13F holdings

# 13F filings are quarterly disclosures, so refreshing more than once a
# day is wasteful. Triggered once daily by cron-job.org during US
# off-hours so the SEC EDGAR servers are less loaded.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-13f
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Heartbeat
        run: |
          echo "── trigger: ${{ github.event_name }}"
          echo "── time:    $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch 13F (SEC EDGAR)
        env:
          SEC_CONTACT_EMAIL: "${{ github.repository_owner }}@users.noreply.github.com"
        run: npm run fetch:13f
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/us-13f.json
          if git diff --staged --quiet; then
            echo "No 13F changes to commit"
            exit 0
          fi
          git commit -m "chore(data): refresh 13F [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt — pulling and retrying..."
            git pull --rebase origin main || exit 1
          done
          echo "Push failed after 5 attempts"
          exit 1
